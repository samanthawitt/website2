name: Deploy Website
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create config.js from Secrets
        run: |
          echo "const OPEN_AI_KEY = '${{ secrets.OPENAI_API_KEY }}';" > config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder your site is in
          branch: gh-pages # The branch the site lives on
