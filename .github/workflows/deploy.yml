name: Deploy Website
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create config.js
        run: |
          # This writes your secret into a file that index.html can see
          echo "const OPEN_AI_KEY = '${{ secrets.OPENAI_API_KEY }}';" > config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .           
          branch: gh-pages    
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true         
